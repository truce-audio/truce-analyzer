[package]
name = "truce-analyzer"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["clap", "vst3", "vst2", "au", "aax"]
clap = ["dep:truce-clap", "dep:clap-sys"]
vst3 = ["dep:truce-vst3"]
vst2 = ["dep:truce-vst2"]
au = ["dep:truce-au"]
aax = ["dep:truce-aax"]
dev = ["truce/dev"]

[dependencies]
truce = { git = "https://github.com/truce-audio/truce" }
truce-gui = { git = "https://github.com/truce-audio/truce" }
truce-egui = { git = "https://github.com/truce-audio/truce" }
truce-core = { git = "https://github.com/truce-audio/truce" }
truce-dsp = { git = "https://github.com/truce-audio/truce" }
truce-clap = { git = "https://github.com/truce-audio/truce", optional = true }
truce-vst3 = { git = "https://github.com/truce-audio/truce", optional = true }
truce-vst2 = { git = "https://github.com/truce-audio/truce", optional = true }
truce-au = { git = "https://github.com/truce-audio/truce", optional = true }
truce-aax = { git = "https://github.com/truce-audio/truce", optional = true }
clap-sys = { version = "0.5", optional = true }
egui = "0.31"
rustfft = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libc = "0.2"

[dev-dependencies]
truce-test = { git = "https://github.com/truce-audio/truce" }

# Local development: override the git deps above with the sibling `../truce`
# checkout so changes there are picked up without a commit+push round-trip.
# Remove before publishing.
[patch."https://github.com/truce-audio/truce"]
truce       = { path = "../truce/crates/truce" }
truce-gui   = { path = "../truce/crates/truce-gui" }
truce-egui  = { path = "../truce/crates/truce-egui" }
truce-core  = { path = "../truce/crates/truce-core" }
truce-dsp   = { path = "../truce/crates/truce-dsp" }
truce-clap  = { path = "../truce/crates/truce-clap" }
truce-vst3  = { path = "../truce/crates/truce-vst3" }
truce-vst2  = { path = "../truce/crates/truce-vst2" }
truce-au    = { path = "../truce/crates/truce-au" }
truce-aax   = { path = "../truce/crates/truce-aax" }
truce-test  = { path = "../truce/crates/truce-test" }
