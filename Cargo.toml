[package]
name = "truce-analyzer"
version = "0.40.1"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "truce-analyzer-standalone"
path = "src/main.rs"
required-features = ["standalone"]

[features]
# Defaults pin the no-signing-required formats so `cargo truce
# install` (and CI without secrets) work without any developer-
# credential setup. `au` (AU v3 install path) needs a Developer
# ID Application identity with a real team ID; `aax` needs PACE /
# iLok signing + the AAX SDK. Both are opt-in per command
# (`--au2` for AU v2 only, `--au3`, `--aax`) or per build
# (enable the feature explicitly).
default = ["clap", "vst3", "lv2", "standalone"]
clap = ["dep:truce-clap", "dep:clap-sys"]
vst3 = ["dep:truce-vst3"]
lv2 = ["dep:truce-lv2"]
au = ["dep:truce-au"]
aax = ["dep:truce-aax"]
shell = ["truce/shell"]
standalone = ["dep:truce-standalone", "truce-standalone/gui"]

[dependencies]
truce            = { git = "https://github.com/truce-audio/truce", tag = "v0.40.1" }
truce-gui        = { git = "https://github.com/truce-audio/truce", tag = "v0.40.1" }
truce-egui       = { git = "https://github.com/truce-audio/truce", tag = "v0.40.1" }
truce-core       = { git = "https://github.com/truce-audio/truce", tag = "v0.40.1" }
truce-dsp        = { git = "https://github.com/truce-audio/truce", tag = "v0.40.1" }
truce-clap       = { git = "https://github.com/truce-audio/truce", tag = "v0.40.1", optional = true }
truce-vst3       = { git = "https://github.com/truce-audio/truce", tag = "v0.40.1", optional = true }
truce-lv2        = { git = "https://github.com/truce-audio/truce", tag = "v0.40.1", optional = true }
truce-au         = { git = "https://github.com/truce-audio/truce", tag = "v0.40.1", optional = true }
truce-aax        = { git = "https://github.com/truce-audio/truce", tag = "v0.40.1", optional = true }
truce-standalone = { git = "https://github.com/truce-audio/truce", tag = "v0.40.1", optional = true }
clap-sys = { version = "0.5", optional = true }
egui = "0.31"
rustfft = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libc = "0.2"

[dev-dependencies]
truce-test = { git = "https://github.com/truce-audio/truce", tag = "v0.40.1" }

[lints.clippy]
pedantic = { level = "warn", priority = -1 }

# Custom profile for `cargo truce install --shell`. Required by the
# shell feature — the shell binary lands at `target/shell/...`,
# independent of `target/release/` and `target/debug/`. Inherits
# release for DSP perf parity.
[profile.shell]
inherits = "release"
