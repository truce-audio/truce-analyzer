[package]
name = "truce-analyzer"
version = "0.2.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "truce-analyzer-standalone"
path = "src/main.rs"
required-features = ["standalone"]

[features]
default = ["clap", "vst3", "vst2", "au", "aax", "standalone"]
clap = ["dep:truce-clap", "dep:clap-sys"]
vst3 = ["dep:truce-vst3"]
vst2 = ["dep:truce-vst2"]
au = ["dep:truce-au"]
aax = ["dep:truce-aax"]
shell = ["truce/shell"]
standalone = ["dep:truce-standalone", "truce-standalone/gui"]

[dependencies]
truce            = { git = "https://github.com/truce-audio/truce", tag = "v0.16.4" }
truce-gui        = { git = "https://github.com/truce-audio/truce", tag = "v0.16.4" }
truce-egui       = { git = "https://github.com/truce-audio/truce", tag = "v0.16.4" }
truce-core       = { git = "https://github.com/truce-audio/truce", tag = "v0.16.4" }
truce-dsp        = { git = "https://github.com/truce-audio/truce", tag = "v0.16.4" }
truce-clap       = { git = "https://github.com/truce-audio/truce", tag = "v0.16.4", optional = true }
truce-vst3       = { git = "https://github.com/truce-audio/truce", tag = "v0.16.4", optional = true }
truce-vst2       = { git = "https://github.com/truce-audio/truce", tag = "v0.16.4", optional = true }
truce-au         = { git = "https://github.com/truce-audio/truce", tag = "v0.16.4", optional = true }
truce-aax        = { git = "https://github.com/truce-audio/truce", tag = "v0.16.4", optional = true }
truce-standalone = { git = "https://github.com/truce-audio/truce", tag = "v0.16.4", optional = true }
clap-sys = { version = "0.5", optional = true }
egui = "0.31"
rustfft = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libc = "0.2"

# Custom profile for `cargo truce install --shell`. Required by the
# shell feature — the shell binary lands at `target/shell/...`,
# independent of `target/release/` and `target/debug/`. Inherits
# release for DSP perf parity.
[profile.shell]
inherits = "release"
