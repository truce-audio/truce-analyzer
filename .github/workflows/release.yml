name: Release

# Build and publish signed package installers when a `v*` tag is
# pushed. `workflow_dispatch` runs the same matrix on demand for dry
# runs against `main`; the resulting artifacts are uploaded but no
# GitHub release is created in that mode.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (arm64)
            runner: macos-14
            os: macos
            artifact: macos-installer
            installer_glob: target/dist/*.pkg
          - label: Windows (x86_64)
            runner: windows-latest
            os: windows
            artifact: windows-installer
            installer_glob: target/dist/*.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.runner }}-release

      # `cargo truce package` builds + bundles + signs + wraps each
      # plugin format into a per-OS installer (`.pkg` on macOS,
      # `.exe` on Windows). Pinned to the same truce release the
      # plugin links against so the installer layout matches the
      # build artifacts exactly.
      - name: install cargo-truce
        run: cargo install cargo-truce --git https://github.com/truce-audio/truce --tag v0.35.1 --locked

      # macOS code-signing setup. All steps are no-ops when the
      # signing secrets aren't configured (forks, contributor PRs),
      # so the workflow still produces an unsigned installer for
      # smoke testing.
      - name: import macOS signing certificate
        if: matrix.os == 'macos' && env.MACOS_CERT_P12_BASE64 != ''
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo -n "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: store notarization credentials
        if: matrix.os == 'macos' && env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "TRUCE_NOTARY" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: build installer (macOS)
        if: matrix.os == 'macos'
        env:
          TRUCE_SIGNING_IDENTITY: ${{ secrets.TRUCE_SIGNING_IDENTITY }}
          TRUCE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.TRUCE_INSTALLER_SIGNING_IDENTITY }}
        run: |
          # Skip notarization automatically when the keychain profile
          # isn't present (no APPLE_ID secret configured).
          if xcrun notarytool history --keychain-profile "TRUCE_NOTARY" >/dev/null 2>&1; then
            cargo truce package
          else
            cargo truce package --no-notarize
          fi

      - name: build installer (Windows)
        if: matrix.os == 'windows'
        run: cargo truce package

      - name: list installer artifacts
        shell: bash
        run: ls -la target/dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.installer_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: generate release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          NOTES="dist/release-notes.md"
          mkdir -p dist
          {
            echo "# ${GITHUB_REF_NAME}"
            echo
            echo "## Changes"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log "$PREV_TAG..${GITHUB_REF_NAME}" --pretty=format:"- %s"
            else
              git log --pretty=format:"- %s"
            fi
            echo
            echo
            echo "## Installers"
            echo
            echo "- macOS: \`Truce Analyzer-*.pkg\`"
            echo "- Windows: \`Truce Analyzer-*.exe\`"
          } > "$NOTES"

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: dist/release-notes.md
          files: |
            dist/macos-installer/*.pkg
            dist/windows-installer/*.exe
            screenshots/analyzer_spectrum.png
            screenshots/analyzer_diff.png
          fail_on_unmatched_files: true
