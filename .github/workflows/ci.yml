name: CI

# Validation pipeline — runs on every push to `main` and every PR.
# Catches build breakage, lint regressions, and test failures before
# they reach a release tag.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (arm64)
            runner: macos-14
            os: macos
            installer_glob: target/dist/*.pkg
          - label: Windows (x86_64)
            runner: windows-latest
            os: windows
            installer_glob: target/dist/*.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.runner }}-ci

      - name: clippy (pedantic)
        run: cargo clippy --all-features --all-targets -- -D warnings

      # Release mode keeps CQT kernel generation fast enough for the
      # screenshot tests (debug is ~16x slower at 22.05 kHz).
      - name: test
        run: cargo test --release --all-features

      - name: upload failing screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failing-screenshots-${{ matrix.runner }}
          path: target/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      # Validate that the installer-build path stays green on every
      # commit, and hand reviewers a downloadable installer for smoke
      # tests on real DAWs. Pinned to the same truce release the plugin
      # links against so the bundle layout matches the build artifacts.
      # No signing here — `--no-notarize` skips the Apple step entirely
      # and macOS produces an unsigned `.pkg`. Signed + notarized
      # installers come from `release.yml` on tag push.
      - name: install cargo-truce
        run: cargo install cargo-truce --git https://github.com/truce-audio/truce --tag v0.35.1 --locked

      - name: package installer
        run: cargo truce package --no-notarize

      - name: list installer artifacts
        shell: bash
        run: ls -la target/dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.installer_glob }}
          if-no-files-found: error
          retention-days: 14
